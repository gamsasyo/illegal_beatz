<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ONE CONTROLLER — SKATE × FLIGHT</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000;
    font-family: ui-monospace, "SF Mono", Menlo, monospace; color: #eaf2ff; }
  .wrap { display: flex; width: 100vw; height: 100vh; }
  .pane { position: relative; flex: 1 1 50%; height: 100%; overflow: hidden; }
  .pane + .pane { border-left: 2px solid #1a2540; }
  iframe { width: 100%; height: 100%; border: 0; display: block; }
  /* 마우스는 통과(트레일 튜너 슬라이더 조작용). 단, 만진 뒤 키보드 포커스는 다시 최상위로 회수 */
  .tag { position: absolute; top: 10px; left: 12px; z-index: 5; font-size: 12px;
    font-weight: 900; font-style: italic; letter-spacing: 2px; color: #ffe24a;
    text-shadow: 2px 2px 0 #000; pointer-events: none; }
  .tag.r { color: #7df0ff; }
  /* 가운데 HUD */
  #hud { position: fixed; top: 0; left: 50%; transform: translateX(-50%); z-index: 20;
    background: rgba(8,10,18,.82); border: 1px solid rgba(127,208,255,.4);
    border-top: none; border-radius: 0 0 10px 10px; padding: 8px 18px; text-align: center;
    backdrop-filter: blur(4px); pointer-events: none; }
  #hud b { color: #ffd27f; }
  #hud .t { font-size: 13px; font-weight: 900; letter-spacing: 3px; color: #fff; }
  #hud .k { font-size: 11px; color: #9fb6d6; margin-top: 3px; letter-spacing: 1px; }
  #hud .st { font-size: 11px; color: #6affb0; margin-top: 2px; letter-spacing: 1px; }
  /* 시작 안내(첫 클릭으로 포커스 확보) */
  #boot { position: fixed; inset: 0; z-index: 30; display: flex; align-items: center;
    justify-content: center; background: rgba(4,6,12,.7); backdrop-filter: blur(3px);
    cursor: pointer; text-align: center; }
  #boot .c { font-size: 15px; letter-spacing: 2px; }
  #boot .go { margin-top: 14px; color: #6affb0; animation: blink 1.1s infinite; }
  @keyframes blink { 50% { opacity: .3; } }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="wrap">
  <div class="pane"><div class="tag">🛹 SKATE</div>
    <iframe id="a" src="skate.html?autostart=1&dual=1" title="skate"></iframe></div>
  <div class="pane"><div class="tag r">✈ FLIGHT</div>
    <iframe id="b" src="flight.html?autostart=1&dual=1" title="flight"></iframe></div>
</div>
<div id="hud">
  <div class="t">ONE CONTROLLER · 한 입력 = 두 게임</div>
  <div class="k"><b>W A S D</b> + <b>SPACE</b> → 둘 다 조작 &nbsp;·&nbsp; <b>E</b> 오토파일럿(정답 패스)</div>
  <div class="st" id="st">MANUAL</div>
</div>
<div id="boot"><div><div class="c">한 키보드로 스케이트보드 + 비행기를 동시에.<br>같은 WASD·SPACE 신호가 두 게임에 똑같이 들어감.</div>
  <div class="go">▶ 클릭해서 시작 (키보드 포커스)</div></div></div>

<script>
  const frames = [document.getElementById('a'), document.getElementById('b')];
  const FWD = ['KeyW', 'KeyA', 'KeyS', 'KeyD', 'Space', 'KeyE'];
  let apOn = false;

  // 한 입력을 두 iframe 게임에 동일하게 전달 (합성 KeyboardEvent)
  function forward(type, e) {
    if (FWD.indexOf(e.code) < 0) return;
    if (e.code === 'Space') e.preventDefault();       // 페이지 스크롤 방지
    if (type === 'keydown' && e.code === 'KeyE' && !e.repeat) {
      apOn = !apOn; document.getElementById('st').textContent = apOn ? 'AUTOPILOT (정답 패스 자동)' : 'MANUAL';
    }
    for (const f of frames) {
      const w = f.contentWindow; if (!w) continue;
      try { w.dispatchEvent(new KeyboardEvent(type, { code: e.code, key: e.key, repeat: e.repeat, bubbles: true })); } catch (_) {}
    }
  }
  addEventListener('keydown', e => forward('keydown', e), true);
  addEventListener('keyup',   e => forward('keyup', e), true);

  // 최상위가 키보드 포커스를 갖도록 — 슬라이더 등 iframe UI를 만진 직후에도 다시 회수
  function grab() {
    for (const f of frames) { try { const a = f.contentDocument.activeElement; a && a.blur && a.blur(); } catch (_) {} }
    window.focus();
  }
  // 각 게임(same-origin) 안에서 마우스 떼면 키보드 포커스를 최상위로 돌려줌
  function wireRegrab(f) {
    try {
      const d = f.contentDocument;
      d.addEventListener('pointerup', () => setTimeout(grab, 0), true);
    } catch (_) {}
  }
  for (const f of frames) f.addEventListener('load', () => wireRegrab(f));
  document.getElementById('boot').addEventListener('click', () => {
    document.getElementById('boot').classList.add('hidden'); grab();
  });
  addEventListener('load', grab);
</script>
</body>
</html>
